name: Deploy Mermail YC Pitch to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - mermail-yc-deck.html
      - .github/workflows/deploy-mermail-yc-deck.yml
      - assets/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build static site artifact
        run: |
          mkdir -p site
          # Default route (/) serves mermail-pitch-deck.html
          cp mermail-pitch-deck.html site/index.html
          cp mermail-pitch-deck.html site/mermail-pitch-deck.html
          
          # /yc route serves mermail-yc-deck.html
          cp mermail-yc-deck.html site/yc.html
          mkdir -p site/yc
          cp mermail-yc-deck.html site/yc/index.html
          
          # Keep original filename for backward compatibility
          cp mermail-yc-deck.html site/mermail-yc-deck.html
          
          # Copy assets directory so that favicon and og-image are deployed
          cp -r assets site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
